<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀오호츠크 투자 대쉬보드</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d2e; --surface2:#242740;
  --accent:#6c63ff; --accent2:#ff6584;
  --green:#00d4aa; --red:#ff4d6d; --yellow:#ffd166;
  --text:#e8eaf6; --text2:#9198b5; --border:#2e3350; --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',-apple-system,sans-serif;padding-bottom:60px}

/* Header */
.header{background:linear-gradient(135deg,#1a1d2e,#242740);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.logo{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold}
.header h1{font-size:20px;font-weight:700}
.header h1 span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:12px;color:var(--text2)}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Layout */
.container{max-width:1400px;margin:0 auto;padding:28px 32px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.stat-card.green::before{background:var(--green)}
.stat-card.red::before{background:var(--red)}
.stat-card.yellow::before{background:var(--yellow)}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:28px;font-weight:700}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px}

/* Timeline */
.timeline{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:28px}
.timeline-title{font-size:14px;font-weight:600;margin-bottom:16px}
.timeline-list{display:flex;position:relative}
.timeline-list::before{content:'';position:absolute;top:16px;left:0;right:0;height:2px;background:var(--border)}
.timeline-item{flex:1;text-align:center;position:relative;padding-top:36px}
.timeline-dot{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:1}
.timeline-dot.done{background:var(--accent);border-color:var(--accent);color:#fff}
.timeline-dot.current{background:var(--green);border-color:var(--green);color:#000;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,.4)}50%{box-shadow:0 0 0 8px rgba(0,212,170,0)}}
.timeline-label{font-size:12px;color:var(--text2)}
.timeline-stocks{font-size:11px;font-weight:600;color:var(--text);margin-top:4px}
.timeline-return{font-size:12px;font-weight:600;margin-top:2px}

/* Round tabs */
.round-tabs{display:flex;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px;margin-bottom:20px}
.round-tab{flex:1;text-align:center;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s;border:none;background:transparent}
.round-tab.active{background:var(--accent);color:#fff}
.round-tab:hover:not(.active):not(.locked){color:var(--text);background:var(--surface2)}
.round-tab.locked{opacity:.4;cursor:not-allowed}

/* Stock cards */
.stocks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(480px,1fr));gap:20px;margin-bottom:28px}
.stock-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.stock-card-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.stock-info{display:flex;align-items:center;gap:12px}
.ticker-badge{background:linear-gradient(135deg,var(--accent),#9c93ff);padding:6px 12px;border-radius:8px;font-size:16px;font-weight:700;letter-spacing:1px}
.stock-name{font-size:14px;font-weight:600}
.stock-sector{font-size:11px;color:var(--text2);margin-top:2px}
.stock-price-info{text-align:right}
.current-price{font-size:22px;font-weight:700}
.price-change{font-size:13px;font-weight:600;margin-top:2px}
.price-change.up{color:var(--green)}
.price-change.down{color:var(--red)}
.stock-card-body{padding:18px 20px}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.metric-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.metric-label{font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase}
.metric-value{font-size:15px;font-weight:600}
.recommendation-row{display:flex;gap:8px;margin-bottom:16px}
.rec-btn{flex:1;padding:8px;border-radius:8px;border:1px solid;font-size:12px;font-weight:600;text-align:center;cursor:default}
.rec-btn.strong-buy{border-color:var(--green);background:rgba(0,212,170,.1);color:var(--green)}
.rec-btn.buy{border-color:#69db7c;background:rgba(105,219,124,.1);color:#69db7c}
.rec-btn.hold{border-color:var(--yellow);background:rgba(255,209,102,.1);color:var(--yellow)}
.rec-btn.sell{border-color:var(--red);background:rgba(255,77,109,.1);color:var(--red)}
.rec-btn.active{opacity:1;transform:scale(1.02)}
.rec-btn:not(.active){opacity:.3}
.news-section{margin-top:12px}
.news-title{font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.news-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.news-item:last-child{border-bottom:none}
.news-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0}
.news-dot.negative{background:var(--red)}
.news-dot.neutral{background:var(--yellow)}
.news-text{color:var(--text2)}
.news-text strong{color:var(--text)}
.news-date{font-size:11px;color:var(--text2);margin-top:2px}

/* Allocation */
.allocation-section{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.chart-title{font-size:14px;font-weight:600;margin-bottom:16px}
.legend-list{display:flex;flex-direction:column;gap:10px}
.legend-item{display:flex;align-items:center;justify-content:space-between;font-size:13px}
.legend-left{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.progress-bar-wrap{flex:1;margin:0 12px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px}
.legend-pct{font-size:12px;color:var(--text2);min-width:36px;text-align:right}

/* Members table */
.members-section{margin-bottom:28px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:600}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
th.right{text-align:right}
td{padding:14px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
td.right{text-align:right}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(108,99,255,.04)}
.member-name{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.pnl-bar-wrap{display:flex;align-items:center;gap:8px;min-width:160px}
.pnl-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pnl-bar-fill{height:100%;border-radius:3px}
.pnl-bar-fill.pos{background:var(--green)}
.pnl-bar-fill.neg{background:var(--red)}
.rank-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.r1{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000}
.r2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#000}
.r3{background:linear-gradient(135deg,#cd7f32,#a05a2c);color:#fff}
.rn{background:var(--surface2);color:var(--text2)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tg{background:rgba(0,212,170,.15);color:var(--green)}
.tr{background:rgba(255,77,109,.15);color:var(--red)}
.ty{background:rgba(145,152,181,.15);color:var(--text2)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px}
.modal-close:hover{color:var(--text)}
.empty-state{text-align:center;padding:48px;color:var(--text2);font-size:14px;grid-column:1/-1}
.empty-state .icon{font-size:40px;margin-bottom:12px}

.m-cards{display:none;flex-direction:column;gap:12px}
.m-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.m-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.m-card-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.m-row{display:flex;justify-content:space-between;font-size:13px}
.m-row-label{color:var(--text2)}
.m-holdings{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}

@media(max-width:900px){
  .container{padding:16px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stocks-grid{grid-template-columns:1fr}
  .allocation-section{grid-template-columns:1fr}
  .header{padding:14px 16px}
  .desktop-table{display:none}
  .m-cards{display:flex}
}
</style>
</head>

let DATA = SEED;
let curRound = 2;

// ── 유틸 ──────────────────────────────────────────
function stockMap() {
  const m = {};
  DATA.rounds.forEach(r => r.stocks.forEach(s => { m[s.ticker] = s; }));
  return m;
}

function memberStats(member) {
  const sm = stockMap();
  let cost = 0, val = 0;
  member.holdings.forEach(h => {
    const s = sm[h.ticker];
    if (!s) return;
    cost += h.quantity * h.buyPrice;
    val  += h.quantity * s.currentPrice;
  });
  const pnl = val - cost;
  const pct = cost > 0 ? pnl / cost * 100 : 0;
  return { cost, val, pnl, pct };
}

function usd(n) {
  return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function pct(n) {
  return (n >= 0 ? '+' : '') + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) + '%';
}
function clr(n) { return n >= 0 ? 'var(--green)' : 'var(--red)'; }

// ── 렌더 ──────────────────────────────────────────
function renderStats() {
  const sm = stockMap();
  let totalCost = 0, totalVal = 0;
  DATA.members.forEach(m => {
    const s = memberStats(m);
    totalCost += s.cost;
    totalVal  += s.val;
  });
  const totalPnl = totalVal - totalCost;
  const totalPct = totalCost > 0 ? totalPnl / totalCost * 100 : 0;
  const allStats = [...DATA.members].map(m => { const s = memberStats(m); return {...m, cost:s.cost, val:s.val, pnl:s.pnl, rate:s.pct}; });
  const active  = allStats.filter(m => m.cost > 0);
  const best    = active.length ? [...active].sort((a,b) => b.rate - a.rate)[0] : null;
  const bestPnl = active.length ? [...active].sort((a,b) => b.pnl  - a.pnl )[0] : null;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card ${totalPnl>=0?'green':'red'}">
      <div class="stat-label">전체 수익률</div>
      <div class="stat-value" style="color:${clr(totalPnl)}">${pct(totalPct)}</div>
      <div class="stat-sub">${totalPnl>=0?'+':''}${usd(totalPnl)} 평가 손익</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">총 투자 금액</div>
      <div class="stat-value">${usd(totalCost)}</div>
      <div class="stat-sub">${DATA.members.length}명 참여</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-label">수익률 TOP</div>
      <div class="stat-value" style="color:var(--yellow);font-size:22px">${best ? best.name : '—'}</div>
      <div class="stat-sub">${best ? pct(best.rate) : ''}</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">수익금 TOP</div>
      <div class="stat-value" style="color:var(--green);font-size:22px">${bestPnl ? bestPnl.name : '—'}</div>
      <div class="stat-sub">${bestPnl ? (bestPnl.pnl>=0?'+':'') + usd(bestPnl.pnl) : ''}</div>
    </div>`;
}

        <div class="m-row">
          <span class="m-row-label">수익금</span>
          <span style="color:${clr(totalPnl)}">${totalPnl>=0?'+':''}${usd(totalPnl)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectRound(id) { curRound = id; renderTabs(); renderStocks(); renderRoundMembers(); }
function closeModal() { document.getElementById('memberModal').classList.remove('open'); }

function openModal(name) {
  const m = DATA.members.find(m=>m.name===name);
  const sm = stockMap();
  const st = memberStats(m);
  document.getElementById('modalTitle').textContent = `${name} 상세 보유 현황`;
  const rows = m.holdings.map(h => {
    const s = sm[h.ticker];
    if (!s) return '';
    const c = h.quantity * h.buyPrice, v = h.quantity * s.currentPrice, p = (v-c)/c*100;
    return `<tr>
      <td><span class="tag ty">${h.ticker}</span></td>
      <td style="text-align:right">${h.quantity}주</td>
      <td style="text-align:right">${usd(c)}</td>
      <td style="text-align:right">${usd(v)}</td>
      <td style="text-align:right;color:${clr(p)}">${pct(p)}</td>
    </tr>`;
  }).join('');
  document.getElementById('modalContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="metric-box"><div class="metric-label">총 투자금</div><div class="metric-value">${usd(st.cost)}</div></div>
      <div class="metric-box"><div class="metric-label">총 수익률</div><div class="metric-value" style="color:${clr(st.pct)}">${pct(st.pct)}</div></div>
    </div>
    <table style="width:100%">
      <thead><tr style="background:var(--surface2)">
        <th style="padding:8px;text-align:left;font-size:11px;color:var(--text2)">종목</th>
        <th style="padding:8px;text-align:right;font-size:11px;color:var(--text2)">수량</th>
        <th style="padding:8px;text-align:right;font-size:11px;color:var(--text2)">매수금</th>
        <th style="padding:8px;text-align:right;font-size:11px;color:var(--text2)">평가금</th>
        <th style="padding:8px;text-align:right;font-size:11px;color:var(--text2)">수익률</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  document.getElementById('memberModal').classList.add('open');
}

async function fetchData() {
  if (!SCRIPT_URL) return;
  document.getElementById('lastUpdated').textContent = '⏳ 시트 데이터 업데이트 중...';
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const res = await fetch(SCRIPT_URL, { signal: ctrl.signal });
    clearTimeout(t);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    DATA = json;
    renderAll();
    document.getElementById('lastUpdated').textContent =
      '최근 업데이트: ' + new Date().toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    clearTimeout(t);
    document.getElementById('lastUpdated').textContent = e.name==='AbortError' ? '⚠️ 시트 연결 시간 초과 (샘플 데이터)' : '⚠️ 시트 연결 실패 (샘플 데이터)';
  }
}

function refresh() { fetchData(); }

// 즉시 렌더 → 백그라운드 시트 업데이트
renderAll();
document.getElementById('lastUpdated').textContent = '샘플 데이터';
fetchData();
</script>
